name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # OIDC
  contents: read

jobs:
  deploy-infra:
    name: Deploy CDK stack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: infra/package-lock.json

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Install infra deps
        working-directory: infra
        run: npm ci

      - name: CDK deploy
        working-directory: infra
        run: npx cdk deploy --require-approval never --outputs-file ../cdk-outputs.json

      - name: Sync Resend API key to Secrets Manager
        if: ${{ env.RESEND_API_KEY != '' }}
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          aws secretsmanager update-secret \
            --secret-id eagles-auction/resend-api-key \
            --secret-string "$RESEND_API_KEY" \
            --region "${{ secrets.AWS_REGION }}" \
            --output text \
            --query 'Name'

      # Amplify Hosting auto-builds on every push to main via its GitHub webhook
      # (configured when the app was connected in the console). No manual trigger
      # needed here — adding one causes LimitExceededException because the
      # webhook-triggered build is already running for the same commit.
